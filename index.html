<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkRanks ULTRA • Secure StreamHub</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #050510;
            --surface: #0a0a1a;
            --surface2: #12122a;
            --border: #1f1f3f;
            --text: #e0e4ff;
            --text2: #8890c0;
            --accent: #00e5ff;
            --pink: #ff006e;
            --radius: 8px;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #0f0f25, #050510 70%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            font-size: 10px;
        }
        .app { max-width:1400px; width:100%; display:flex; flex-direction:column; gap:6px; padding:6px; }

        /* LOGIN OVERLAY */
        .login-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000;
            display:flex; align-items:center; justify-content:center;
        }
        .login-box {
            background:var(--surface); border-radius:12px; padding:24px; width:300px; text-align:center;
            border:1px solid var(--accent); box-shadow:0 0 30px rgba(0,229,255,0.2);
        }
        .login-box h2 { font-size:18px; color:var(--accent); margin-bottom:15px; }
        .login-box input { width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:#0f0f20; color:#fff; margin-bottom:10px; font-size:11px; }
        .btn-primary { background:var(--accent); color:#000; border:none; font-weight:700; cursor:pointer; }
        .google-btn { background:#fff; color:#000; display:flex; align-items:center; justify-content:center; gap:6px; margin:10px 0; border:1px solid #dadce0; }
        .google-btn img { width:18px; }

        /* HEADER */
        .header {
            display:flex; align-items:center; gap:10px; flex-wrap:wrap;
            background:var(--surface); border-radius:var(--radius); padding:8px 12px;
            border:1px solid var(--border); box-shadow:var(--shadow);
        }
        .logo { display:flex; align-items:center; gap:8px; cursor:pointer; }
        .skull-icon {
            font-size:28px; display:inline-block;
            animation: flip 3s infinite alternate;
        }
        @keyframes flip { 0%{transform:rotateY(0);} 100%{transform:rotateY(180deg);} }
        .brand-text {
            font-weight:800; font-size:16px;
            background:linear-gradient(135deg, var(--accent), var(--pink));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .live-badge {
            display:flex; align-items:center; gap:5px; background:var(--surface2); padding:4px 10px; border-radius:20px;
        }
        .live-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6);} 50%{box-shadow:0 0 0 8px rgba(34,197,94,0);} }
        .clock-date { margin-left:auto; display:flex; gap:10px; font-size:11px; color:var(--text2); }
        .btn { padding:4px 8px; border-radius:5px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:9px; cursor:pointer; display:flex; align-items:center; gap:2px; font-weight:600; }
        .btn:hover { background:var(--surface2); color:var(--text); border-color:var(--accent); }

        /* PLAYER */
        .player-wrapper {
            position:relative; background:#000; border-radius:var(--radius); overflow:hidden;
            border:1px solid var(--accent); box-shadow:0 0 20px rgba(0,229,255,0.15);
        }
        #playerContainer { width:100%; aspect-ratio:16/9; position:relative; }
        #playerContainer iframe, #playerContainer video { width:100%; height:100%; border:0; position:absolute; top:0; left:0; }
        .player-controls {
            position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7);
            display:flex; align-items:center; gap:8px; padding:6px 12px; opacity:0; transition:opacity 0.3s;
        }
        .player-wrapper:hover .player-controls { opacity:1; }
        .ctrl-btn { background:none; border:none; color:#fff; cursor:pointer; font-size:12px; }
        .nav-arrow { position:absolute; top:50%; transform:translateY(-50%); font-size:24px; color:#fff; background:rgba(0,0,0,0.5); border:none; cursor:pointer; padding:8px; border-radius:50%; }
        .nav-prev { left:10px; } .nav-next { right:10px; }

        /* SIDEBAR PANEL */
        .sidebar-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99;
            display:none; align-items:flex-end; justify-content:center;
        }
        .sidebar-overlay.open { display:flex; }
        .channel-panel {
            background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-height:70vh;
            overflow-y:auto; padding:16px; border-top:2px solid var(--accent);
            box-shadow:0 -5px 30px rgba(0,0,0,0.8); touch-action:pan-y;
        }
        .panel-handle { width:40px; height:4px; background:var(--text2); border-radius:2px; margin:0 auto 10px; cursor:grab; }
        .tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
        .tab { padding:5px 10px; border-radius:16px; background:var(--surface2); color:var(--text2); cursor:pointer; border:1px solid transparent; font-weight:600; font-size:9px; }
        .tab.active { background:var(--accent); color:#000; }
        .tab .count { background:#1e293b; padding:1px 4px; border-radius:4px; font-size:7px; margin-left:3px; }
        .search-input { width:100%; padding:8px; border-radius:6px; border:1px solid var(--border); background:#0f0f20; color:#fff; margin-bottom:10px; font-size:10px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:6px; }
        .card { background:var(--surface2); border-radius:8px; overflow:hidden; cursor:pointer; border:1px solid transparent; transition:var(--transition); position:relative; }
        .card:hover { border-color:var(--accent); transform:scale(1.02); }
        .card.active { border-color:var(--accent); box-shadow:0 0 12px rgba(0,229,255,0.3); }
        .card-thumb { width:100%; aspect-ratio:16/9; background:#1a1a2e; display:flex; align-items:center; justify-content:center; font-size:22px; }
        .card-thumb img { width:100%; height:100%; object-fit:cover; }
        .card-name { padding:4px 6px; font-size:9px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .card-badge { font-size:7px; padding:1px 4px; border-radius:3px; margin:2px 0; display:inline-block; }
        .actions { position:absolute; top:3px; right:3px; display:flex; gap:2px; opacity:0; transition:opacity 0.2s; }
        .card:hover .actions { opacity:1; }
        .action-btn { width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,0.7); color:#fff; border:none; font-size:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .add-section { background:var(--surface); border-radius:8px; padding:8px; border:1px dashed var(--accent); display:flex; gap:6px; margin-top:10px; }
        .add-section.hidden { display:none; }
        .add-section input, .add-section select { flex:1; padding:6px; border-radius:4px; border:1px solid var(--border); background:#0f0f20; color:#fff; font-size:10px; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:100; display:none; }
        .modal.open { display:flex; }
        .modal-content { background:var(--surface); border-radius:12px; padding:16px; width:90%; max-width:350px; border:1px solid var(--accent); }
        .modal-content h3 { margin-bottom:10px; }
        .modal-content input, .modal-content select { width:100%; padding:8px; border-radius:4px; border:1px solid var(--border); background:#0f0f20; color:#fff; margin-bottom:8px; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
        .toast { position:fixed; bottom:20px; right:20px; background:var(--surface); color:var(--text); padding:8px 16px; border-radius:8px; border:1px solid var(--accent); z-index:999; opacity:0; transition:opacity 0.3s; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
    <div class="app">
        <!-- LOGIN OVERLAY -->
        <div class="login-overlay" id="authOverlay">
            <div class="login-box" id="authBox">
                <h2>🔐 Viewer Login</h2>
                <input type="email" id="authEmail" placeholder="Email" />
                <input type="password" id="authPassword" placeholder="Password" />
                <button class="btn-primary" id="authActionBtn">Login</button>
                <button class="google-btn" id="googleSignInBtn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"> Sign in with Google
                </button>
                <span style="font-size:10px;color:var(--text2);cursor:pointer;" id="authSwitch">Register</span>
                <span style="font-size:10px;color:var(--text2);cursor:pointer;margin-top:6px;display:block;" id="adminSwitch">Admin Login</span>
            </div>
            <div class="login-box" id="adminBox" style="display:none;">
                <h2>🔐 Admin</h2>
                <input type="password" id="adminPassword" placeholder="Admin password" />
                <button class="btn-primary" id="adminLoginBtn">Unlock</button>
                <span style="font-size:10px;color:var(--text2);cursor:pointer;" id="backToViewer">Back</span>
            </div>
        </div>

        <!-- HEADER -->
        <div class="header">
            <div class="logo" id="togglePanelBtn">
                <span class="skull-icon">💀</span>
                <span class="brand-text">DarkRanks ULTRA</span>
            </div>
            <div class="live-badge"><span class="live-dot"></span> <span id="liveCount">0</span> channels</div>
            <div class="clock-date">
                <span id="clock">00:00:00</span> <span id="dateDisplay">Jan 01</span>
            </div>
            <div style="margin-left:auto; display:flex; gap:6px;">
                <button class="btn" id="shuffleBtn">🎲</button>
                <button class="btn" id="exportBtn">💾</button>
                <button class="btn" id="importBtn">📂</button>
                <button class="btn" id="compactToggle">📐</button>
                <button class="btn" id="themeToggle">🌓</button>
                <button class="btn" id="logoutBtn" style="display:none;">🚪</button>
                <button class="btn" id="viewerLogoutBtn" style="display:none;">🔒 Sign out</button>
            </div>
        </div>

        <!-- PLAYER -->
        <div class="player-wrapper">
            <div id="playerContainer"><div style="text-align:center;padding:30px;color:#475569;">Select a channel</div></div>
            <div class="player-controls" id="playerControls">
                <button class="ctrl-btn" id="refreshBtn">🔄</button>
                <button class="ctrl-btn" id="pipBtn">📌</button>
                <div style="flex:1;"></div>
                <button class="ctrl-btn" id="fullscreenBtn">🖥️</button>
            </div>
            <button class="nav-arrow nav-prev" id="prevBtn">‹</button>
            <button class="nav-arrow nav-next" id="nextBtn">›</button>
        </div>

        <!-- SIDEBAR OVERLAY -->
        <div class="sidebar-overlay" id="sidebarOverlay">
            <div class="channel-panel" id="channelPanel">
                <div class="panel-handle" id="panelHandle"></div>
                <div class="tabs" id="tabsContainer">
                    <button class="tab active" data-cat="all">🌐 All <span class="count" id="countAll">0</span></button>
                    <button class="tab" data-cat="youtube">▶️ YT <span class="count" id="countYt">0</span></button>
                    <button class="tab" data-cat="facebook">📱 FB <span class="count" id="countFb">0</span></button>
                    <button class="tab" data-cat="web">🌊 Web <span class="count" id="countWeb">0</span></button>
                    <button class="tab" data-cat="tv">📺 TV <span class="count" id="countTv">0</span></button>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="Search channels..." />
                <div class="grid" id="channelGrid"></div>
                <div class="add-section" id="addSection">
                    <input type="text" id="channelNameInput" placeholder="Title" />
                    <input type="text" id="channelUrlInput" placeholder="URL" />
                    <select id="channelCategorySelect">
                        <option value="auto">Auto</option>
                        <option value="youtube">YT</option>
                        <option value="facebook">FB</option>
                        <option value="web">Web</option>
                        <option value="tv">TV</option>
                    </select>
                    <button class="btn-primary" id="addChannelBtn">➕ Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>✏️ Edit Channel</h3>
            <input type="text" id="editName" placeholder="Name" />
            <input type="text" id="editUrl" placeholder="URL" />
            <select id="editCategory">
                <option value="youtube">YouTube</option>
                <option value="facebook">Facebook</option>
                <option value="web">Web</option>
                <option value="tv">TV</option>
            </select>
            <div class="modal-actions">
                <button class="btn" id="cancelEdit">Cancel</button>
                <button class="btn-primary" id="saveEdit">Save</button>
            </div>
        </div>
    </div>

    <input type="file" id="importFileInput" accept=".json" style="display:none">
    <div class="toast" id="toast"></div>

    <script>
        (() => {
            const firebaseConfig = {
                apiKey: "AIzaSyAxf2AANYSTxAHzOzLa4RT8Eyi68Z8b0tA",
                authDomain: "streamstation-4b55e.firebaseapp.com",
                projectId: "streamstation-4b55e",
                storageBucket: "streamstation-4b55e.firebasestorage.app",
                messagingSenderId: "873439558930",
                appId: "1:873439558930:web:a17d4c50baf18df6abc7cb"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            const API_BASE = 'https://streamstation.netlify.app/.netlify/functions/api';

            let channels = [], activeIndex = -1, activeCategory = 'all', searchQuery = '';
            let hlsInstance = null, currentPlayerElement = null;
            let adminToken = null, isAdmin = false, editChannelId = null, currentFirebaseUser = null;

            // DOM refs
            const grid = document.getElementById('channelGrid'), container = document.getElementById('playerContainer'),
                toastEl = document.getElementById('toast'), addSection = document.getElementById('addSection'),
                sidebarOverlay = document.getElementById('sidebarOverlay'), editModal = document.getElementById('editModal'),
                searchInput = document.getElementById('searchInput');

            // Toast
            let toastTimer;
            function showToast(msg, error=false) {
                clearTimeout(toastTimer);
                toastEl.textContent = msg; toastEl.style.color = error ? '#fca5a5' : '#e0e4ff';
                toastEl.classList.add('show'); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            // Clock & Date
            function updateClock() {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
                document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
            }
            setInterval(updateClock, 1000); updateClock();

            // Auth UI
            let isRegisterMode = false;
            document.getElementById('authSwitch').addEventListener('click', () => {
                isRegisterMode = !isRegisterMode;
                document.getElementById('authActionBtn').textContent = isRegisterMode ? 'Register' : 'Login';
                document.getElementById('authSwitch').textContent = isRegisterMode ? 'Login instead' : 'Register';
            });
            document.getElementById('adminSwitch').addEventListener('click', () => {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('adminBox').style.display = 'block';
            });
            document.getElementById('backToViewer').addEventListener('click', () => {
                document.getElementById('adminBox').style.display = 'none';
                document.getElementById('authBox').style.display = 'block';
            });

            document.getElementById('authActionBtn').addEventListener('click', async () => {
                const email = document.getElementById('authEmail').value.trim();
                const pass = document.getElementById('authPassword').value;
                if (!email || !pass) return showToast('Email and password required', true);
                try {
                    if (isRegisterMode) await auth.createUserWithEmailAndPassword(email, pass);
                    else await auth.signInWithEmailAndPassword(email, pass);
                } catch(e) { showToast(e.message, true); }
            });

            document.getElementById('googleSignInBtn').addEventListener('click', async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try { await auth.signInWithPopup(provider); } catch(e) { showToast(e.message, true); }
            });

            document.getElementById('adminLoginBtn').addEventListener('click', async () => {
                const pass = document.getElementById('adminPassword').value;
                try {
                    const res = await fetch(`${API_BASE}/admin-login`, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ password: pass })
                    });
                    if (!res.ok) throw new Error('Wrong password');
                    const data = await res.json();
                    adminToken = data.token; isAdmin = true;
                    document.getElementById('adminBox').style.display = 'none';
                    document.getElementById('authOverlay').style.display = 'none';
                    updateAdminUI(); showToast('🔓 Admin access');
                    loadChannels();
                } catch(e) { showToast(e.message, true); }
            });

            document.getElementById('viewerLogoutBtn').addEventListener('click', () => {
                auth.signOut(); currentFirebaseUser = null; channels = []; activeIndex = -1;
                renderGrid(); destroyPlayer();
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('viewerLogoutBtn').style.display = 'none';
                isAdmin = false; adminToken = null; updateAdminUI();
            });

            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentFirebaseUser = user;
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('viewerLogoutBtn').style.display = 'flex';
                    if (!isAdmin) await loadChannels();
                } else {
                    currentFirebaseUser = null;
                    document.getElementById('viewerLogoutBtn').style.display = 'none';
                    if (!isAdmin) document.getElementById('authOverlay').style.display = 'flex';
                }
            });

            function updateAdminUI() {
                addSection.classList.toggle('hidden', !isAdmin);
                document.getElementById('logoutBtn').style.display = isAdmin ? 'flex' : 'none';
                document.querySelectorAll('.actions .edit-btn, .actions .del-btn').forEach(b => b.style.display = isAdmin ? '' : 'none');
            }
            document.getElementById('logoutBtn').addEventListener('click', () => {
                isAdmin = false; adminToken = null; updateAdminUI(); showToast('👋 Admin logged out');
            });

            // API helpers
            async function apiFetch(path, method='GET', body=null, useAdminToken=false) {
                const headers = { 'Content-Type': 'application/json' };
                if (useAdminToken && adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
                else if (currentFirebaseUser) {
                    const idToken = await currentFirebaseUser.getIdToken();
                    headers['Authorization'] = `Bearer ${idToken}`;
                }
                const res = await fetch(`${API_BASE}/${path}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: 'Network error' }));
                    throw new Error(err.error || 'Request failed');
                }
                return res.json();
            }

            async function loadChannels() {
                try {
                    channels = await apiFetch('channels');
                    channels = channels.map(c => ({ ...c, firebaseKey: c.id, thumbnail: c.thumbnail || null, emoji: c.emoji || '📡' }));
                    if (activeIndex >= channels.length) activeIndex = channels.length > 0 ? 0 : -1;
                    renderGrid();
                    if (activeIndex >= 0) playChannel(activeIndex);
                    document.getElementById('liveCount').textContent = channels.length;
                } catch(e) { showToast('Failed to load channels: ' + e.message, true); }
            }

            async function addChannelToServer(data) { return await apiFetch('channels', 'POST', data, true); }
            async function deleteChannelFromServer(id) { await apiFetch(`channels/${id}`, 'DELETE', null, true); }
            async function updateChannelOnServer(id, data) { await apiFetch(`channels/${id}`, 'PUT', data, true); }

            // Player
            function destroyPlayer() {
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                if (currentPlayerElement) { currentPlayerElement.remove(); currentPlayerElement = null; }
            }
            function playChannel(index) {
                destroyPlayer();
                if (index < 0 || index >= channels.length) return;
                const ch = channels[index]; activeIndex = index;
                const url = ch.url.trim(), cat = ch.category;
                let iframe = document.createElement('iframe');
                if (cat === 'youtube') {
                    const match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
                    iframe.src = `https://www.youtube-nocookie.com/embed/${match?.[1]}?autoplay=1&mute=1&controls=1&playsinline=1&rel=0`;
                } else if (cat === 'facebook') {
                    iframe.src = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0&autoplay=1&mute=1`;
                } else {
                    iframe.src = url;
                }
                iframe.allow = 'autoplay; fullscreen; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:0;';
                container.innerHTML = ''; container.appendChild(iframe);
                currentPlayerElement = iframe;
            }

            // Navigation arrows
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (channels.length) { activeIndex = (activeIndex - 1 + channels.length) % channels.length; playChannel(activeIndex); }
            });
            document.getElementById('nextBtn').addEventListener('click', () => {
                if (channels.length) { activeIndex = (activeIndex + 1) % channels.length; playChannel(activeIndex); }
            });

            // Sidebar toggle
            document.getElementById('togglePanelBtn').addEventListener('click', () => sidebarOverlay.classList.toggle('open'));
            // Drag to close (touch)
            let startY = 0;
            document.getElementById('panelHandle').addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
            document.getElementById('panelHandle').addEventListener('touchmove', (e) => {
                if (e.touches[0].clientY - startY > 60) sidebarOverlay.classList.remove('open');
            });

            // Render channel grid
            function getFilteredSorted() {
                let list = [...channels];
                if (activeCategory !== 'all') list = list.filter(c => c.category === activeCategory);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    list = list.filter(c => c.name.toLowerCase().includes(q) || c.url.toLowerCase().includes(q));
                }
                return list;
            }
            function renderGrid() {
                const filtered = getFilteredSorted(); grid.innerHTML = '';
                if (!filtered.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:15px;color:#64748b;">📭 No channels</div>'; return; }
                filtered.forEach(ch => {
                    const idx = channels.indexOf(ch); const card = document.createElement('div');
                    card.className = 'card'; if (idx === activeIndex) card.classList.add('active');
                    const thumb = ch.thumbnail; const thumbHTML = thumb ? `<img src="${thumb}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="placeholder" style="display:none;">${ch.emoji || '📡'}</div>` : `<div class="placeholder">${ch.emoji || '📡'}</div>`;
                    card.innerHTML = `<div class="card-thumb">${thumbHTML}</div><div class="card-name">${ch.name}</div><span class="card-badge" style="background:${ch.category==='youtube'?'#fee2e2':ch.category==='facebook'?'#dbeafe':ch.category==='web'?'#d1fae5':'#ede9fe'};color:${ch.category==='youtube'?'#dc2626':'#2563eb'}">${ch.category}</span><div class="actions"><button class="action-btn edit-btn" data-id="${ch.id}">✎</button><button class="action-btn del-btn" data-id="${ch.id}">✕</button></div>`;
                    card.addEventListener('click', (e) => { if (e.target.closest('.actions')) return; activeIndex = idx; renderGrid(); playChannel(activeIndex); sidebarOverlay.classList.remove('open'); });
                    card.querySelector('.del-btn').addEventListener('click', async (e) => { e.stopPropagation(); if (!isAdmin) return; await deleteChannelFromServer(ch.id); await loadChannels(); });
                    card.querySelector('.edit-btn').addEventListener('click', (e) => { e.stopPropagation(); openEditModal(ch); });
                    grid.appendChild(card);
                });
                updateCounts();
            }
            function updateCounts() {
                const counts = { all: channels.length, youtube:0, facebook:0, web:0, tv:0 };
                channels.forEach(c => { if (counts[c.category] !== undefined) counts[c.category]++; });
                ['All','Yt','Fb','Web','Tv'].forEach((k,i) => { const el = document.getElementById('count'+['All','Yt','Fb','Web','Tv'][i]); if (el) el.textContent = counts[['all','youtube','facebook','web','tv'][i]]; });
            }
            function openEditModal(ch) {
                editChannelId = ch.id; document.getElementById('editName').value = ch.name;
                document.getElementById('editUrl').value = ch.url; document.getElementById('editCategory').value = ch.category;
                editModal.classList.add('open');
            }
            async function saveEdit() {
                const name = document.getElementById('editName').value.trim();
                const url = document.getElementById('editUrl').value.trim();
                const category = document.getElementById('editCategory').value;
                if (!name || !url) return showToast('Name and URL required', true);
                await updateChannelOnServer(editChannelId, { name, url, category });
                editModal.classList.remove('open'); await loadChannels();
            }

            // Add channel
            document.getElementById('addChannelBtn').addEventListener('click', async () => {
                if (!isAdmin) return showToast('Admin only', true);
                const name = document.getElementById('channelNameInput').value.trim();
                const url = document.getElementById('channelUrlInput').value.trim();
                if (!name || !url) return showToast('Enter title and URL', true);
                let cat = document.getElementById('channelCategorySelect').value;
                if (cat === 'auto') cat = /facebook\.com/i.test(url) ? 'facebook' : /youtube\.com|youtu\.be/i.test(url) ? 'youtube' : 'web';
                try {
                    await addChannelToServer({ name, url, category: cat, emoji: '📡' });
                    document.getElementById('channelNameInput').value = ''; document.getElementById('channelUrlInput').value = '';
                    await loadChannels();
                } catch(e) { showToast(e.message, true); }
            });

            // Search
            searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderGrid(); });
            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active'); activeCategory = tab.dataset.cat; renderGrid();
                });
            });

            // Shuffle, Export, Import, Compact, Theme
            document.getElementById('shuffleBtn').addEventListener('click', () => {
                if (!channels.length) return; activeIndex = Math.floor(Math.random() * channels.length); renderGrid(); playChannel(activeIndex);
            });
            document.getElementById('exportBtn').addEventListener('click', () => {
                const data = JSON.stringify(channels.map(c => ({ name:c.name, url:c.url, category:c.category })), null, 2);
                const blob = new Blob([data], { type: 'application/json' }); const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'channels.json'; a.click();
            });
            document.getElementById('importBtn').addEventListener('click', () => {
                if (!isAdmin) return showToast('Admin only', true); document.getElementById('importFileInput').click();
            });
            document.getElementById('importFileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                const text = await file.text(); try {
                    const arr = JSON.parse(text); for (const item of arr) await addChannelToServer({ name: item.name, url: item.url, category: item.category || 'web' });
                    await loadChannels(); showToast('📂 Imported');
                } catch { showToast('Invalid file', true); }
                e.target.value = '';
            });
            document.getElementById('compactToggle').addEventListener('click', () => { document.body.classList.toggle('compact'); localStorage.setItem('compact', document.body.classList.contains('compact')); });
            if (localStorage.getItem('compact') === 'true') document.body.classList.add('compact');
            document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('light'); localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark'); });
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
            document.getElementById('cancelEdit').addEventListener('click', () => editModal.classList.remove('open'));
            document.getElementById('saveEdit').addEventListener('click', saveEdit);

            // Start with auth overlay
            document.getElementById('authOverlay').style.display = 'flex';
        })();
    </script>
</body>
</html>
